<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left vertical bar of R -->
  <polygon
    points="10,28 22,35 22,81 10,74"
    fill="#0000AA"
  />
  
  <!-- Top-left slanted bar (accent color for 3D bevel effect) -->
  <!-- Top triangle: lighter blue -->
  <polygon
    points="10,28 50,5 50,19"
    fill="#0022FF"
  />
  <!-- Bottom triangle: main brand blue -->
  <polygon
    points="10,28 50,19 22,35"
    fill="#0000AA"
  />

  <!-- Outer loop of R (top-right, right, bottom-right) -->
  <path
    d="M 50 5 L 90 28 L 90 74 L 78 81 L 78 35 L 50 19 Z"
    fill="#0000AA"
  />
  
  <!-- Slanted bridge connecting left bar to central house -->
  <path
    d="M 22 42 L 40 47 L 40 57 L 22 50 Z"
    fill="#0000AA"
  />
  
  <!-- Center House Hexagon -->
  <polygon
    points="40,47 52,40 64,47 64,61 52,68 40,61"
    fill="#0000AA"
  />
  <!-- 4 Windows in Center House -->
  <rect x="46" y="49" width="3" height="3" fill="#FFFFFF" />
  <rect x="54" y="49" width="3" height="3" fill="#FFFFFF" />
  <rect x="46" y="56" width="3" height="3" fill="#FFFFFF" />
  <rect x="54" y="56" width="3" height="3" fill="#FFFFFF" />
  
  <!-- Slanted bottom leg of R -->
  <polygon
    points="50,97 62,90 44,70 32,77"
    fill="#0000AA"
  />
</svg>